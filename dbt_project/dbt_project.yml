name: 'de_agent_lakehouse'
version: '1.0.0'
config-version: 2

profile: 'de_agent_snowflake'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  de_agent_lakehouse:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      # Intermediate models are materialized as Snowflake Dynamic Tables.
      # The materialization + target_lag + snowflake_warehouse are set in
      # each model's own config() block so the per-model settings are
      # explicit and self-documenting. See docs/reference-snowflake.md.
      +schema: intermediate
