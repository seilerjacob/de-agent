# Snowflake native app profile.
#
# This file is designed for use with Snowflake's native dbt integration
# (Snowsight > Data Engineering > dbt Projects). The native app injects
# account and user from the active session — those fields are not needed here.
#
# env_var() is NOT supported in the Snowflake native app runtime. All values
# in this file must be hardcoded literals.
#
# For local CLI use, see profiles.local.yml.

de_agent_snowflake:
  target: snowflake_ui
  outputs:
    snowflake_ui:
      type: snowflake
      account: "not needed"
      user: "not needed"
      authenticator: oauth
      role: DATA_ENGINEER
      database: DE_AGENT_SPIKE
      warehouse: SNOWFLAKE_LEARNING_WH
      schema: DE_AGENT
      threads: 4
