version: 2

models:
  - name: acme__contacts
    description: >
      Staged Acme CRM contacts. Renames source columns to the canonical naming
      convention and casts types. One row per Acme contact.
    columns:
      - name: contact_id
        description: "Acme-assigned contact identifier (varchar)"
        tests:
          - unique
          - not_null
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
      - name: email
        description: "Renamed from email_address"
      - name: phone_number
        description: "Renamed from phone"
      - name: organization
        description: "Renamed from company_name"
      - name: created_at
        description: "Cast from created_date string to date"
        tests:
          - not_null

  - name: acme__sales
    description: >
      Staged Acme CRM sales line items. Casts types only — column names are
      already canonical. One row per sale line item.
    columns:
      - name: sale_line_id
        description: "Unique identifier for the sale line item"
        tests:
          - unique
          - not_null
      - name: sale_id
        description: "Identifier of the parent sale"
        tests:
          - not_null
      - name: customer_id
        description: "Surrogate key of the customer"
        tests:
          - not_null
      - name: product_id
        description: "Surrogate key of the product"
        tests:
          - not_null
      - name: amount
        description: "Monetary amount for the sale line"
        tests:
          - not_null
      - name: stage
        description: "Sales stage (closed_won, closed_lost, pending)"
      - name: close_date
        description: "Date the sale was closed; null when pending"
      - name: created_at
        description: "Timestamp the sale line was created"
        tests:
          - not_null

  - name: acme__inventory
    description: >
      Staged Acme CRM inventory. Renames source columns to the canonical naming
      convention and casts types. One row per Acme product/item.
    columns:
      - name: product_id
        description: "Acme-assigned item identifier (varchar), renamed from item_id"
        tests:
          - unique
          - not_null
      - name: product_name
        description: "Renamed from item_name"
        tests:
          - not_null
      - name: product_description
        description: "Renamed from item_description"
      - name: product_category
        description: "Renamed from category"
      - name: retail_price
        description: "Renamed from price"
        tests:
          - not_null
      - name: stock_quantity
        description: "Renamed from stock_qty"
      - name: created_at
        description: "Cast from added_date string to date"
        tests:
          - not_null
