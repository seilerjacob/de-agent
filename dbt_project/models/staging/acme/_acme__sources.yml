version: 2

sources:
  - name: acme
    description: "Raw ingestion from the Acme CRM SQLite database"
    schema: raw
    tables:
      - name: acme__contacts
        description: "Acme CRM contact records — maps to customer entity"
        columns:
          - name: contact_id
            description: "Acme-assigned contact identifier"
          - name: first_name
            description: "Contact first name"
          - name: last_name
            description: "Contact last name"
          - name: email_address
            description: "Contact email"
          - name: phone
            description: "Contact phone number"
          - name: company_name
            description: "Associated company/organization"
          - name: created_date
            description: "Date the contact was created (ISO 8601 date)"

      - name: acme__inventory
        description: "Acme CRM product/inventory records — maps to product entity"
        columns:
          - name: item_id
            description: "Acme-assigned item identifier"
          - name: item_name
            description: "Product/item name"
          - name: item_description
            description: "Free-text description"
          - name: category
            description: "Product category"
          - name: price
            description: "Unit selling price"
          - name: stock_qty
            description: "Current stock quantity"
          - name: added_date
            description: "Date the item was added to inventory (ISO 8601 date)"

      - name: acme__sales
        description: "Acme CRM sales line items — line-item grain, multiple rows per sale_id"
        columns:
          - name: sale_line_id
            description: "Unique identifier for the sale line item"
          - name: sale_id
            description: "Identifier of the parent sale (groups line items)"
          - name: customer_id
            description: "Surrogate key of the customer (matches customer_sk in unified_customers)"
          - name: product_id
            description: "Surrogate key of the product (matches product_sk in unified_products)"
          - name: amount
            description: "Monetary amount for the sale line"
          - name: stage
            description: "Sales stage (closed_won, closed_lost, pending)"
          - name: close_date
            description: "Date the sale was closed (ISO 8601 date); null when pending"
          - name: created_at
            description: "Timestamp the sale line was created (ISO 8601 datetime)"
