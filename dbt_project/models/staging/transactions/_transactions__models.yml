version: 2

models:
  - name: transactions__sales
    description: >
      Staged sales line items. Casts source columns to canonical types.
      One row per sale line item. No business logic applied here.
    columns:
      - name: sale_line_id
        description: "Unique identifier for the sale line item (varchar)"
        tests:
          - unique
          - not_null
      - name: sale_id
        description: "Identifier of the parent sale (varchar)"
        tests:
          - not_null
      - name: customer_id
        description: "Surrogate key of the customer (varchar)"
        tests:
          - not_null
      - name: product_id
        description: "Surrogate key of the product (varchar)"
        tests:
          - not_null
      - name: amount
        description: "Monetary amount for the sale line (double)"
        tests:
          - not_null
      - name: stage
        description: "Sales stage (varchar)"
      - name: close_date
        description: "Date the sale was closed (date)"
      - name: created_at
        description: "Timestamp the sale line was created (timestamp)"
        tests:
          - not_null

  - name: transactions__quotes
    description: >
      Staged quote line items. Casts source columns to canonical types.
      One row per quote line item. No business logic applied here.
    columns:
      - name: quote_line_id
        description: "Unique identifier for the quote line item (varchar)"
        tests:
          - unique
          - not_null
      - name: quote_id
        description: "Identifier of the parent quote (varchar)"
        tests:
          - not_null
      - name: customer_id
        description: "Surrogate key of the customer (varchar)"
        tests:
          - not_null
      - name: product_id
        description: "Surrogate key of the product (varchar)"
        tests:
          - not_null
      - name: quoted_price
        description: "Quoted unit price for the line (double)"
        tests:
          - not_null
      - name: quantity
        description: "Quantity quoted (integer)"
        tests:
          - not_null
      - name: status
        description: "Quote status (varchar)"
      - name: expiry_date
        description: "Date the quote expires (date)"
      - name: created_at
        description: "Timestamp the quote line was created (timestamp)"
        tests:
          - not_null
