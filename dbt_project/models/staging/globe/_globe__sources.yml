version: 2

sources:
  - name: globe
    description: "Raw ingestion from the Globe CRM SQLite database"
    schema: raw
    tables:
      - name: globe__customers
        description: "Globe CRM customer records — maps to customer entity"
        columns:
          - name: cust_id
            description: "Globe-assigned customer identifier"
          - name: full_name
            description: "Customer full name (single field)"
          - name: email
            description: "Customer email"
          - name: mobile_phone
            description: "Customer mobile phone"
          - name: organization
            description: "Associated organization"
          - name: signup_date
            description: "Datetime the customer signed up (ISO 8601 datetime)"
          - name: status
            description: "Account status: active, inactive, or churned"

      - name: globe__products
        description: "Globe CRM product records — maps to product entity"
        columns:
          - name: prod_id
            description: "Globe-assigned product identifier"
          - name: product_title
            description: "Product display name"
          - name: product_desc
            description: "Product description"
          - name: product_type
            description: "Product type/category"
          - name: unit_cost
            description: "Internal cost per unit"
          - name: retail_price
            description: "Customer-facing retail price"
          - name: available
            description: "Availability flag (1=available, 0=discontinued)"
          - name: created_at
            description: "Datetime the product was created (ISO 8601 datetime)"

      - name: globe__quotes
        description: "Globe CRM quote line items — line-item grain, multiple rows per quote_id"
        columns:
          - name: quote_line_id
            description: "Unique identifier for the quote line item"
          - name: quote_id
            description: "Identifier of the parent quote (groups line items)"
          - name: customer_id
            description: "Surrogate key of the customer (matches customer_sk in unified_customers)"
          - name: product_id
            description: "Surrogate key of the product (matches product_sk in unified_products)"
          - name: quoted_price
            description: "Quoted unit price for the line"
          - name: quantity
            description: "Quantity quoted"
          - name: status
            description: "Quote status (draft, sent, accepted, expired)"
          - name: expiry_date
            description: "Date the quote expires (ISO 8601 date)"
          - name: created_at
            description: "Timestamp the quote line was created (ISO 8601 datetime)"
